<!DOCTYPE html>
<html>
<body style="margin: 0; padding: 0; background-color: #0b0e14; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <table width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #0b0e14;">
        <tr>
            <td align="center" style="padding: 40px 10px;">
                <div style="max-width: 600px; background-color: #171a21; border: 1px solid #2a475e; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    
                    <div style="background-color: #1a44c2; padding: 25px; text-align: center;">
                        <h1 style="color: #ffffff; margin: 0; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold;">
                            📩 Novo Feedback Recebido
                        </h1>
                    </div>

                    <div style="padding: 30px; text-align: left;">
                        <p style="color: #66c0f4; font-weight: bold; text-transform: uppercase; font-size: 11px; margin-bottom: 5px;">Utilizador / Cliente</p>
                        <p style="margin-top: 0; font-size: 16px; color: #ffffff;">{{ nome }} <span style="color: #8f98a0; font-size: 14px;">({{ email }})</span></p>
                        
                        <p style="color: #66c0f4; font-weight: bold; text-transform: uppercase; font-size: 11px; margin-bottom: 5px; margin-top: 25px;">Assunto do Pedido</p>
                        <p style="margin-top: 0; font-size: 16px; color: #ffffff;">{{ assunto }}</p>
                        
                        <hr style="border: 0; border-top: 1px solid #2a475e; margin: 25px 0;">
                        
                        <p style="color: #66c0f4; font-weight: bold; text-transform: uppercase; font-size: 11px; margin-bottom: 10px;">Mensagem Enviada:</p>
                        <div style="background-color: #0b0e14; padding: 20px; border-radius: 6px; border-left: 4px solid #66c0f4; line-height: 1.6; color: #e1e7ee; font-size: 14px; white-space: pre-wrap;">
{{ mensagem }}
                        </div>

                        <div style="margin-top: 30px; text-align: center;">
                            <a href="mailto:{{ email }}" style="display: inline-block; background-color: #66c0f4; color: #ffffff; padding: 12px 25px; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 12px; text-transform: uppercase;">
                                Responder ao Cliente
                            </a>
                        </div>
                    </div>

                    <div style="background-color: #0b0e14; padding: 15px; text-align: center; font-size: 10px; color: #4a5a6a; border-top: 1px solid #1b2838;">
                        Este e-mail foi disparado automaticamente pelo sistema <strong>Yuzaki Export</strong>.
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
